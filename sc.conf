server {
    server_name sc.joewang.me; 

    location / {
        proxy_pass http://127.0.0.1:15002;
        
        # Standard headers to pass real client info to the app
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }



    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sc.joewang.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sc.joewang.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = sc.joewang.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name sc.joewang.me;
    listen 80;
    return 404; # managed by Certbot


}